<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acrílicos Pegaz</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <header>
        <h1>Acrílicos Pegaz</h1>
        <nav>
            <ul>
                <li><a href="#servicios">Servicios</a></li>
                <li><a href="#catalogo">Catálogo</a></li>
                <li><a href="#contacto">Contacto</a></li>
            </ul>
        </nav>
    </header>
    
    <section id="servicios">
        <h2>Nuestros Servicios</h2>
        <p>Transformación de acrílico, policarbonato sólido y corte láser.</p>
    </section>
    
   <section id="catalogo">
    <h2>Catálogo de Trabajos</h2>
    <div class="galeria">
        <img src="img/producto1.jpg" alt="Producto 1" onclick="mostrarImagen(this)">
        <img src="img/producto2.jpg" alt="Producto 2" onclick="mostrarImagen(this)">
        <img src="img/producto3.jpg" alt="Producto 3" onclick="mostrarImagen(this)">
    </div>
</section>

<!-- Lightbox para ver imágenes en grande -->
<div id="lightbox" class="lightbox">
    <span class="cerrar" onclick="cerrarImagen()">&times;</span>
    <img class="lightbox-imagen" id="imagenAmpliada">
</div>
    <script>
    function mostrarImagen(img) {
        let lightbox = document.getElementById("lightbox");
        let imagenAmpliada = document.getElementById("imagenAmpliada");

        imagenAmpliada.src = img.src; // Cambia la imagen del lightbox
        lightbox.style.display = "flex"; // Muestra el lightbox
    }

    function cerrarImagen() {
        document.getElementById("lightbox").style.display = "none"; // Oculta el lightbox
    }
</script>

</body>
</html>
